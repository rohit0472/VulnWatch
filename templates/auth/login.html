{% extends 'base.html' %}
{% block title %}Login — VulnWatch{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header text-center py-4 border-bottom-0">
                <h3 class="mb-1">
                    <i class="fas fa-shield-alt me-2" style="color: #3fb950;"></i>
                    <span style="color: #58a6ff;">VulnWatch</span>
                </h3>
                <small class="text-secondary">Sign in to monitor vulnerabilities</small>
            </div>
            
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label text-light">Email address</label>
                        <input type="email" name="email" class="form-control"
                               placeholder="you@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-light">Password</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="••••••••" required>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="text-secondary" for="remember">Remember me</label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="card-footer text-center py-3 bg-transparent border-top-0">
                <small class="text-secondary">
                    Don't have an account? 
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none" style="color: #58a6ff;">
                        Register here
                    </a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
